<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 24px; display: flex; gap: 16px; align-items: stretch; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; padding: 24px; }
  .logo { flex: 2.2; }
  .logo img { width: 100%; max-width: 360px; height: auto; display: block; }
  .icon { flex: 1; }
  .icon img { width: 120px; height: 120px; border-radius: 26px; display: block; box-shadow: var(--shadow-md); }
</style>
</head>
<body>
  <div class="panel logo"><img src="../assets/logo-horizontal-dark.png" alt="Sonic Spotlights logo" /></div>
  <div class="panel icon"><img src="../assets/app-icon.png" alt="Sonic Spotlights app icon" /></div>
</body>
</html>
