<!-- @dsCard group="Colors" viewport="700x190" name="Status — emerald, red, amber" subtitle="Confirmed · destructive · inferred. Amber is never a button." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 24px; }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; }
  .chip { height: 72px; }
  .meta { padding: 10px 12px 12px; }
  .name { font-family: var(--font-heading); font-weight: 700; font-size: 14px; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-meta); margin-top: 3px; }
  .use { font-family: var(--font-body); font-size: 12px; color: var(--text-secondary); margin-top: 6px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background: var(--emerald-500);"></div>
      <div class="meta"><div class="name">Emerald</div><div class="hex">#10b981 · #34d399</div><div class="use">Confirmed · positive · live status.</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--red-500);"></div>
      <div class="meta"><div class="name">Red</div><div class="hex">#ef4444</div><div class="use">Destructive confirmations only.</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--amber-500);"></div>
      <div class="meta"><div class="name">Amber</div><div class="hex">#f5a623</div><div class="use">"I inferred this" / attention flag — never a button.</div></div>
    </div>
  </div>
</body>
</html>
