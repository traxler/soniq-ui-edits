<!-- @dsCard group="Colors" viewport="700x190" name="Action roles — purple voice, yellow decision" subtitle="The one-decision rule: purple everywhere, yellow once." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 24px; }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; }
  .chip { height: 72px; display: flex; align-items: flex-end; padding: 10px; }
  .meta { padding: 10px 12px 12px; }
  .name { font-family: var(--font-heading); font-weight: 700; font-size: 14px; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-meta); margin-top: 3px; }
  .use { font-family: var(--font-body); font-size: 12px; color: var(--text-secondary); margin-top: 6px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background: var(--void-black); border-bottom: 1px solid var(--border);"></div>
      <div class="meta"><div class="name">Void Black</div><div class="hex">#050505</div><div class="use">App background — the calm workspace.</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--purple-500);"></div>
      <div class="meta"><div class="name">Electric Purple</div><div class="hex">#8b5cf6 · 500</div><div class="use">Brand voice · secondary actions · links · reasoning.</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--yellow-400);"></div>
      <div class="meta"><div class="name">Laser Yellow</div><div class="hex">#facc15</div><div class="use">The one primary action. One per screen.</div></div>
    </div>
  </div>
</body>
</html>
