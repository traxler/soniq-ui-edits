<!-- @dsCard group="Type" viewport="700x180" name="Precision — JetBrains Mono & caps labels" subtitle="Mono for scores/timestamps/citations. Tracked caps for eyebrows." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 28px; display: flex; flex-direction: column; gap: 18px; }
  .group { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--text-meta); white-space: nowrap; }
  .mono { font-family: var(--font-mono); font-weight: 500; font-size: 13px; letter-spacing: 0.01em; color: var(--ink-muted); }
  .mono .n { color: var(--emerald-400); }
  .caps { font-family: var(--font-heading); font-weight: 600; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-meta); }
</style>
</head>
<body>
  <div class="group"><span class="mono"><span class="n">89</span> match · cached 2h ago · cites 3 sources</span><span class="spec">JetBrains Mono · 12–13</span></div>
  <div class="group"><span class="caps">Core Palette</span><span class="spec">Plus Jakarta · 600 · 0.06em · uppercase</span></div>
</body>
</html>
