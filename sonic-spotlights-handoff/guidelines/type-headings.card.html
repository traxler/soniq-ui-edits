<!-- @dsCard group="Type" viewport="700x320" name="Headings — Plus Jakarta Sans" subtitle="Display 64/800 · H1 48/700 · H2 32/700 · H3 24/600." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 28px; }
  .line { display: flex; align-items: baseline; justify-content: space-between; gap: 24px; padding: 10px 0; border-bottom: 1px solid var(--border-faint); }
  .line:last-child { border-bottom: 0; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--text-meta); white-space: nowrap; }
  .d  { font-family: var(--font-heading); font-weight: 800; font-size: 52px; line-height: 1.05; letter-spacing: -0.02em; color: var(--ink); }
  .h1 { font-family: var(--font-heading); font-weight: 700; font-size: 40px; line-height: 1.1; letter-spacing: -0.01em; color: var(--ink); }
  .h2 { font-family: var(--font-heading); font-weight: 700; font-size: 30px; color: var(--ink); }
  .h3 { font-family: var(--font-heading); font-weight: 600; font-size: 23px; color: var(--ink); }
</style>
</head>
<body>
  <div class="line"><span class="d">Collaborate. Create.</span><span class="spec">Display · 64 · 800</span></div>
  <div class="line"><span class="h1">Your release dashboard</span><span class="spec">H1 · 48 · 700</span></div>
  <div class="line"><span class="h2">Curator matches</span><span class="spec">H2 · 32 · 700</span></div>
  <div class="line"><span class="h3">Pitch settings</span><span class="spec">H3 · 24 · 600</span></div>
</body>
</html>
