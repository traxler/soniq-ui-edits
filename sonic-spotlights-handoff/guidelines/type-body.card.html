<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 28px; }
  .line { display: flex; align-items: baseline; justify-content: space-between; gap: 32px; padding: 12px 0; border-bottom: 1px solid var(--border-faint); }
  .line:last-child { border-bottom: 0; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--text-meta); white-space: nowrap; flex: none; }
  .lg { font-family: var(--font-body); font-weight: 400; font-size: 18px; line-height: 1.5; color: var(--ink); }
  .df { font-family: var(--font-body); font-weight: 400; font-size: 16px; line-height: 1.5; color: var(--ink-muted); }
  .sm { font-family: var(--font-body); font-weight: 400; font-size: 14px; line-height: 1.4; color: var(--ink-muted); }
</style>
</head>
<body>
  <div class="line"><span class="lg">Soniq drafts the pitch from the curator's history and your voice — you review and confirm before anything sends.</span><span class="spec">Large · 18 · 400</span></div>
  <div class="line"><span class="df">Standard body text and field descriptions sit at sixteen pixels for comfortable reading on dark surfaces.</span><span class="spec">Default · 16 · 400</span></div>
  <div class="line"><span class="sm">Supporting text and metadata.</span><span class="spec">Small · 14 · 400</span></div>
</body>
</html>
